<!DOCTYPE html>
<html lang="ko">
<head>
<script>
  // iframe 안이면 즉시 html에 클래스 추가 (배경 투명 처리)
  if (window.parent && window.parent !== window) {
    document.documentElement.classList.add('in-iframe');
  }
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미래CEO플랜 | 솔루션 진단</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
* { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif !important; }
</style>
<style>
  :root {
    --primary: #3182F6;
    --primary-dark: #1a6ee0;
    --primary-light: #EBF3FF;
    --bg: #F7F9FC;
    --surface: #ffffff;
    --text: #111827;
    --text-sub: #6B7280;
    --text-light: #9CA3AF;
    --border: #E5E7EB;
    --accent: #0F172A;
    --success: #10B981;
    --radius: 16px;
    --shadow: 0 4px 24px rgba(49,130,246,0.08);
    --shadow-card: 0 2px 12px rgba(0,0,0,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Pretendard', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  /* iframe 내부일 때 — 모달 카드 배경이 그대로 보이도록 투명 처리 */
  html.in-iframe, html.in-iframe body { background: transparent; }

  /* INTRO SCREEN */
  .intro-screen {
    max-width: 560px;
    width: 100%;
    text-align: center;
    animation: fadeUp 0.6s ease both;
  }

  .intro-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--primary-light);
    color: var(--primary);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 28px;
    letter-spacing: 0.02em;
  }

  .intro-badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--primary);
    border-radius: 50%;
  }

  .intro-title {
    font-family: 'Pretendard', sans-serif;
    font-size: clamp(26px, 5vw, 38px);
    font-weight: 700;
    line-height: 1.35;
    color: var(--accent);
    margin-bottom: 16px;
    letter-spacing: -0.02em;
  }

  .intro-title span {
    color: var(--primary);
  }

  .intro-desc {
    font-size: 15px;
    color: var(--text-sub);
    line-height: 1.7;
    margin-bottom: 40px;
  }

  .intro-meta {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 40px;
  }

  .intro-meta-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .intro-meta-num {
    font-size: 22px;
    font-weight: 700;
    color: var(--primary);
  }

  .intro-meta-label {
    font-size: 12px;
    color: var(--text-light);
  }

  .btn-start {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--primary);
    color: white;
    font-size: 16px;
    font-weight: 600;
    padding: 16px 40px;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 16px rgba(49,130,246,0.3);
  }

  .btn-start:hover {
    background: var(--primary-dark);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(49,130,246,0.35);
  }

  .btn-start svg {
    transition: transform 0.2s;
  }

  .btn-start:hover svg {
    transform: translateX(3px);
  }

  /* QUIZ SCREEN */
  .quiz-screen {
    max-width: 600px;
    width: 100%;
    display: none;
    animation: fadeUp 0.5s ease both;
  }

  .quiz-header {
    margin-bottom: 32px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .progress-track {
    font-size: 13px;
    color: var(--text-sub);
    font-weight: 500;
  }

  .progress-pct {
    font-size: 13px;
    color: var(--primary);
    font-weight: 600;
  }

  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--primary);
    border-radius: 100px;
    transition: width 0.4s ease;
  }

  .quiz-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 36px;
    box-shadow: var(--shadow-card);
    border: 1px solid var(--border);
  }

  .quiz-step-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--primary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .quiz-question {
    font-family: 'Pretendard', sans-serif;
    font-size: clamp(18px, 3vw, 22px);
    font-weight: 600;
    color: var(--accent);
    line-height: 1.5;
    margin-bottom: 28px;
    letter-spacing: -0.01em;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .options-grid.single-col {
    grid-template-columns: 1fr;
  }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: left;
    line-height: 1.4;
  }

  .option-btn:hover {
    border-color: var(--primary);
    background: var(--primary-light);
    color: var(--primary);
    transform: translateY(-1px);
  }

  .option-btn.selected {
    border-color: var(--primary);
    background: var(--primary-light);
    color: var(--primary);
  }

  .option-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .option-btn.selected .option-dot {
    border-color: var(--primary);
    background: var(--primary);
  }

  .option-btn.selected .option-dot::after {
    content: '';
    width: 6px; height: 6px;
    background: white;
    border-radius: 50%;
  }

  .quiz-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 28px;
  }

  .btn-back {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--text-sub);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    padding: 8px 0;
    transition: color 0.2s;
  }

  .btn-back:hover { color: var(--text); }
  .btn-back:disabled { opacity: 0.3; cursor: default; }

  .btn-next {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--primary);
    color: white;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 28px;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 2px 10px rgba(49,130,246,0.25);
  }

  .btn-next:hover:not(:disabled) {
    background: var(--primary-dark);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(49,130,246,0.3);
  }

  .btn-next:disabled {
    background: var(--border);
    color: var(--text-light);
    cursor: default;
    box-shadow: none;
  }

  /* RESULT SCREEN */
  .result-screen {
    max-width: 600px;
    width: 100%;
    display: none;
    animation: fadeUp 0.6s ease both;
  }

  .result-card {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }

  .result-header {
    background: linear-gradient(135deg, #0F172A 0%, #1e3a5f 100%);
    padding: 36px;
    position: relative;
    overflow: hidden;
  }

  .result-header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(49,130,246,0.3) 0%, transparent 70%);
    border-radius: 50%;
  }

  .result-track-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.8);
    font-size: 12px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 100px;
    margin-bottom: 16px;
    letter-spacing: 0.04em;
  }

  .result-type-title {
    font-family: 'Pretendard', sans-serif;
    font-size: clamp(22px, 4vw, 30px);
    font-weight: 700;
    color: white;
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .result-subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.65);
    line-height: 1.6;
  }

  .result-body {
    padding: 32px 36px;
  }

  .result-insight {
    background: var(--primary-light);
    border-left: 3px solid var(--primary);
    border-radius: 0 8px 8px 0;
    padding: 16px 20px;
    margin-bottom: 28px;
  }

  .result-insight-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .result-insight-text {
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    line-height: 1.5;
  }

  .result-solutions {
    margin-bottom: 28px;
  }

  .result-solutions-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-sub);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .solution-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .solution-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 100px;
  }

  .solution-tag.primary {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
  }

  .result-desc {
    font-size: 14px;
    color: var(--text-sub);
    line-height: 1.75;
    margin-bottom: 32px;
  }

  .btn-cta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    background: var(--primary);
    color: white;
    font-size: 16px;
    font-weight: 600;
    padding: 18px 32px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(49,130,246,0.3);
    margin-bottom: 12px;
  }

  .btn-cta:hover {
    background: var(--primary-dark);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(49,130,246,0.35);
  }

  .btn-retry {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    background: none;
    border: 1.5px solid var(--border);
    color: var(--text-sub);
    font-size: 14px;
    font-weight: 500;
    padding: 13px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-retry:hover {
    border-color: var(--text-sub);
    color: var(--text);
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .screen-transition {
    animation: fadeUp 0.4s ease both;
  }

  /* RESPONSIVE */
  @media (max-width: 480px) {
    .quiz-card { padding: 24px 20px; }
    .options-grid { grid-template-columns: 1fr; }
    .result-header { padding: 28px 24px; }
    .result-body { padding: 24px; }
    .intro-meta { gap: 16px; }
  }
</style>
</head>
<body>

<!-- INTRO -->
<div class="intro-screen" id="introScreen">
  <div class="intro-badge">미래CEO플랜 솔루션 진단</div>
  <h1 class="intro-title">
    어떤 솔루션이<br>
    <span>필요한지 모르겠다면?</span>
  </h1>
  <p class="intro-desc">
    몇 가지 질문에 답하면<br>
    지금 대표님께 가장 필요한 솔루션을 찾아드립니다.
  </p>
  <div class="intro-meta">
    <div class="intro-meta-item">
      <span class="intro-meta-num">1~2분</span>
      <span class="intro-meta-label">소요시간</span>
    </div>
    <div class="intro-meta-item">
      <span class="intro-meta-num">5~6개</span>
      <span class="intro-meta-label">질문 수</span>
    </div>
    <div class="intro-meta-item">
      <span class="intro-meta-num">맞춤형</span>
      <span class="intro-meta-label">솔루션 추천</span>
    </div>
  </div>
  <button class="btn-start" onclick="startQuiz()">
    진단 시작하기
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>
</div>

<!-- QUIZ -->
<div class="quiz-screen" id="quizScreen">
  <div class="quiz-header">
    <div class="progress-info">
      <span class="progress-track" id="progressTrack">질문 1 / 6</span>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>
  <div class="quiz-card">
    <div class="quiz-step-label" id="stepLabel">STEP 01</div>
    <div class="quiz-question" id="questionText"></div>
    <div class="options-grid" id="optionsGrid"></div>
  </div>
  <div class="quiz-nav">
    <button class="btn-back" id="btnBack" onclick="prevStep()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      이전
    </button>
    <button class="btn-next" id="btnNext" onclick="nextStep()" disabled>
      다음
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </div>
</div>

<!-- RESULT -->
<div class="result-screen" id="resultScreen">
  <div class="result-card">
    <div class="result-header">
      <div class="result-track-badge" id="resultTrackBadge"></div>
      <div class="result-type-title" id="resultTypeTitle"></div>
      <div class="result-subtitle" id="resultSubtitle"></div>
    </div>
    <div class="result-body">
      <div class="result-insight">
        <div class="result-insight-label">지금 가장 시급한 것</div>
        <div class="result-insight-text" id="resultInsight"></div>
      </div>
      <div class="result-solutions">
        <div class="result-solutions-title">추천 솔루션</div>
        <div class="solution-tags" id="solutionTags"></div>
      </div>
      <p class="result-desc" id="resultDesc"></p>
      <button class="btn-cta" id="btnCta">
        <span id="ctaText">솔루션 보러가기</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
      <button class="btn-retry" onclick="resetQuiz()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        처음부터 다시하기
      </button>
    </div>
  </div>
</div>

<script>
// =====================
// QUIZ DATA
// =====================

const TRACKS = {
  corp: '법인',
  sole: '자영업자·소상공인',
  seller: '셀러·벤더'
};

// Q0: 공통 분기 질문
const Q0 = {
  step: 0,
  label: 'STEP 01',
  question: '대표님은 어떤 사업자이신가요?',
  options: [
    { text: '법인 운영 중', value: 'corp' },
    { text: '개인사업자 (자영업·소상공인)', value: 'sole' },
    { text: '온라인 셀러·벤더', value: 'seller' }
  ],
  singleCol: true
};

const CORP_QUESTIONS = [
  {
    step: 1,
    label: 'STEP 02',
    question: '법인의 주된 업종은 무엇인가요?',
    options: [
      { text: '제조·생산', value: 'mfg' },
      { text: '도소매·유통', value: 'trade' },
      { text: '건설·부동산', value: 'const' },
      { text: 'IT·소프트웨어', value: 'it' },
      { text: '서비스·컨설팅', value: 'svc' },
      { text: '기타', value: 'etc' }
    ]
  },
  {
    step: 2,
    label: 'STEP 03',
    question: '지난해 법인 연매출은 어느 정도인가요?',
    options: [
      { text: '5억 미만', value: 'rev1' },
      { text: '5억~30억', value: 'rev2' },
      { text: '30억~100억', value: 'rev3' },

  {

      { text: '15년 이상', value: 'age4' }
    ]
  },
  {
    step: 4,
    label: 'STEP 05',
    question: '현재 직원 수는 어느 정도인가요?',
    options: [
      { text: '5인 미만', value: 'emp1' },
      { text: '5~20인', value: 'emp2' },
      { text: '20~50인', value: 'emp3' },
      { text: '50인 이상', value: 'emp4' }
    ]
  },
  {
    step: 5,
    label: 'STEP 06',
    question: '지금 법인 운영에서 가장 신경 쓰이는 부분은?',
    options: [
      { text: '세금이 너무 많이 나온다', value: 'concern_tax', category: '세무·절세' },

      { text: '인력 채용·관리가 힘들다', value: 'concern_hr', category: 'HR·채용' },
      { text: '승계·상속 준비가 안 돼 있다', value: 'concern_succ', category: '경영관리' },
      { text: '정부 지원금을 제대로 못 받고 있다', value: 'concern_gov', category: '정책자금·정부지원사업' },
      { text: '정관·명의신탁 등 경영 리스크가 걱정된다', value: 'concern_law', category: '경영관리' },
      { text: '마케팅·매출 성장이 필요하다', value: 'concern_mkt', category: '마케팅' }
    ],
    singleCol: true
  }
];

const SOLE_QUESTIONS = [
  {
    step: 1,
    label: 'STEP 02',
    question: '주된 업종은 무엇인가요?',
    options: [
      { text: '음식점·카페', value: 'food' },
      { text: '소매점·편의점', value: 'retail' },

        ctaLink: './index.html'
      };
    }
    if (concern === 'concern_auto') {

        solutions: ['매출 및 수익 자동화', '주문·재고관리'],
        primarySolution: '매출 및 수익 자동화',
        desc: '광고 자동 최적화, 가격 자동 조정, 리뷰 관리 자동화까지 셀러 비즈니스를 시스템화하는 방법을 확인하세요.',
        ctaText: '매출 자동화 솔루션 보러가기',
        ctaLink: './index.html'
      };
    }
    if (concern === 'concern_global') {
      return {
        type: '해외 진출을 준비 중인 셀러',
        subtitle: '국내 시장의 한계를 넘어 글로벌 매출을 만들 수 있습니다.',
        insight: '아마존·이베이 입점부터 현지화 전략까지 준비가 필요합니다.',
        solutions: ['해외진출', 'OEC·ODM', '물류·배송'],
        primarySolution: '해외진출',
        desc: '해외 플랫폼 입점 대행부터 현지 물류 파트너 연결, 통관·세금 처리까지 해외 진출 전 과정을 지원합니다.',
        ctaText: '해외진출 솔루션 보러가기',
        ctaLink: './index.html'
      };
    }
    return {
      type: '정산·세금 관리가 필요한 셀러',
      subtitle: '플랫폼별 정산과 세금 신고를 따로 관리하면 실수가 생깁니다.',
      insight: '멀티채널 정산 통합과 세금 신고 체계를 먼저 정비하세요.',
      solutions: ['법률서비스', '주문·재고관리'],
      primarySolution: '법률서비스',
      desc: '플랫폼별 수수료·정산 내역 통합 관리부터 부가세 신고, 소득 신고까지 셀러에 특화된 세금 관리 방법을 확인하세요.',
      ctaText: '법률서비스 솔루션 보러가기',
      ctaLink: './index.html'
    };
  }
}

// =====================
// STATE
// =====================

let currentTrack = null;
let currentStepIndex = 0; // 0 = Q0 (공통), 1~ = 트랙별
let answers = [];
let isOnQ0 = true;

function getCurrentQuestions(track) {
  if (track === 'corp') return CORP_QUESTIONS;
  if (track === 'sole') return SOLE_QUESTIONS;
  if (track === 'seller') return SELLER_QUESTIONS;
  return [];
}

function getCurrentQuestion() {
  if (isOnQ0) return Q0;
  const questions = getCurrentQuestions(currentTrack);
  return questions[currentStepIndex];
}

function getTotalSteps() {
  if (!currentTrack) return 1;
  return 1 + getCurrentQuestions(currentTrack).length;
}

function getCurrentGlobalStep() {
  if (isOnQ0) return 1;
  return 2 + currentStepIndex;
}

// =====================
// RENDER
// =====================

function renderQuestion() {
  const q = getCurrentQuestion();
  const total = getTotalSteps();
  const current = getCurrentGlobalStep();
  const pct = Math.round(((current - 1) / total) * 100);

  document.getElementById('progressTrack').textContent = `질문 ${current} / ${total}`;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = `${pct}%`;
  document.getElementById('stepLabel').textContent = q.label;
  document.getElementById('questionText').textContent = q.question;

  const grid = document.getElementById('optionsGrid');
  grid.className = 'options-grid' + (q.singleCol ? ' single-col' : '');
  grid.innerHTML = '';

  // 현재 답변 인덱스
  const answerIdx = isOnQ0 ? -1 : currentStepIndex;
  const currentAnswer = isOnQ0 ? answers[0] : answers[answerIdx + 1];

  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (currentAnswer === opt.value ? ' selected' : '');
    btn.innerHTML = `<span class="option-dot"></span>${opt.text}`;
    btn.onclick = () => selectOption(opt.value);
    grid.appendChild(btn);
  });

  document.getElementById('btnBack').disabled = (isOnQ0);

  const isLast = !isOnQ0 && currentStepIndex === getCurrentQuestions(currentTrack).length - 1;
  const nextBtn = document.getElementById('btnNext');

  if (isLast) {
    // 마지막 질문: 결과 보기 버튼 표시
    nextBtn.style.display = 'flex';
    nextBtn.disabled = !currentAnswer;
    nextBtn.innerHTML = '결과 보기 <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
  } else {
    // 중간 질문: 다음 버튼 숨김 (선택 즉시 자동 이동)
    nextBtn.style.display = 'none';
  }
}

function selectOption(value) {
  if (isOnQ0) {
    answers[0] = value;
  } else {
    answers[currentStepIndex + 1] = value;
  }

  const isLast = !isOnQ0 && currentStepIndex === getCurrentQuestions(currentTrack).length - 1;

  if (isLast) {
    // 마지막 질문: 선택 표시 후 결과 보기 버튼 활성화
    renderQuestion();
  } else {
    // 중간 질문: 즉시 다음으로 이동
    nextStep();
  }
}

// =====================
// NAVIGATION
// =====================

function nextStep() {
  const answerIdx = isOnQ0 ? 0 : currentStepIndex + 1;
  if (!answers[answerIdx]) return;

  if (isOnQ0) {
    currentTrack = answers[0];
    isOnQ0 = false;
    currentStepIndex = 0;
    // 트랙 전환시 이후 answers 초기화
    answers = [answers[0]];
    renderQuestion();
    return;
  }

  const questions = getCurrentQuestions(currentTrack);
  if (currentStepIndex < questions.length - 1) {
    currentStepIndex++;
    renderQuestion();
  } else {
    showResult();
  }
}

function prevStep() {
  if (isOnQ0) return;
  if (currentStepIndex === 0) {
    isOnQ0 = true;
    currentTrack = null;
    renderQuestion();
    return;
  }
  currentStepIndex--;
  renderQuestion();
}

// =====================
// RESULT
// =====================

function showResult() {
  const trackAnswers = answers.slice(1); // Q0 제외
  const result = getResult(currentTrack, trackAnswers);

  document.getElementById('resultTrackBadge').textContent = TRACKS[currentTrack] + ' 트랙';
  document.getElementById('resultTypeTitle').textContent = result.type;
  document.getElementById('resultSubtitle').textContent = result.subtitle;
  document.getElementById('resultInsight').textContent = result.insight;
  document.getElementById('resultDesc').textContent = result.desc;
  document.getElementById('ctaText').textContent = result.ctaText;
  document.getElementById('btnCta').onclick = () => {
    const targetUrl = result.ctaLink;
    // iframe 내부면 부모 창을 이동, 아니면 현재 창
    if (window.parent && window.parent !== window) {
      try {
        window.parent.location.href = targetUrl;
      } catch (e) {
        window.location.href = targetUrl;
      }
    } else {
      window.location.href = targetUrl;
    }
  };

  const tagsEl = document.getElementById('solutionTags');
  tagsEl.innerHTML = '';
  result.solutions.forEach((sol, i) => {
    const tag = document.createElement('span');
    tag.className = 'solution-tag' + (i === 0 ? ' primary' : '');
    tag.textContent = (i === 0 ? '✦ ' : '') + sol;
    tagsEl.appendChild(tag);
  });

  document.getElementById('quizScreen').style.display = 'none';
  const resultEl = document.getElementById('resultScreen');
  resultEl.style.display = 'block';
  resultEl.classList.add('screen-transition');
}

// =====================
// CONTROLS
// =====================

function startQuiz() {
  answers = [];
  currentTrack = null;
  currentStepIndex = 0;
  isOnQ0 = true;

  document.getElementById('introScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  renderQuestion();
}

function resetQuiz() {
  answers = [];
  currentTrack = null;
  currentStepIndex = 0;
  isOnQ0 = true;

  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('introScreen').style.display = 'block';
}
</script>
